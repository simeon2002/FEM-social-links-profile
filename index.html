<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />

    <title>Social links profile</title>
  </head>
  <body>
    <article class="socials-card">
      <img src="assets/images/avatar-jessica.jpeg" alt="Avatar of jessica on socials links card" class="socials-card__avatar" />
      <address>
        <p class="socials-card__author">Jessica Randall</p>
        <p class="socials-card__location">London, United Kingdom</p>
      </address>
      <p class="socials-card__bio">"Front-end developer and avid reader."</p>
      <nav class="socials-card__links">
        <a href="" class="socials-card__btn">GitHub</a>
        <a href="" class="socials-card__btn">Frontend Mentor</a>
        <a href="" class="socials-card__btn">LinkedIn</a>
        <a href="" class="socials-card__btn">Twitter</a>
        <a href="" class="socials-card__btn">Instagram</a>
      </nav>
    </article>
  </body>
</html>
